---
# .yamllint.yml — yamllint configuration for nas-gitops
extends: default

rules:
  line-length:
    max: 120
    level: warning
  truthy:
    allowed-values: ["true", "false"]
    check-keys: true
  comments:
    require-starting-space: true
    min-spaces-from-content: 1
  indentation:
    spaces: 2
    indent-sequences: true
  document-start:
    present: true
  braces:
    max-spaces-inside: 1
  brackets:
    max-spaces-inside: 1

ignore:
  - .venv/
  - claude-ansible-skills-main/
