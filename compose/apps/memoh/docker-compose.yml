---
# Memoh — Self-hosted AI agent platform
# https://github.com/memohai/Memoh
services:
  postgres:
    image: postgres:18-alpine
    container_name: memoh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: memoh
      POSTGRES_USER: memoh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memoh123}
    volumes:
      - postgres_data:/var/lib/postgresql
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "5432"
    networks:
      - nas-platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoh"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: memohai/server:0.6.1
    container_name: memoh-migrate
    restart: "no"
    entrypoint: ["/app/memoh-server", "migrate", "up"]
    volumes:
      - ./config.toml:/app/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nas-platform

  server:
    image: memohai/server:0.6.1
    container_name: memoh-server
    restart: unless-stopped
    privileged: true
    pid: host
    volumes:
      - ./config.toml:/app/config.toml:ro
      - containerd_data:/var/lib/containerd
      - server_cni_state:/var/lib/cni
      - memoh_data:/opt/memoh/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${NAS_LAN_IP:-192.168.50.10}:8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - nas-platform
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    image: memohai/web:0.6.1
    container_name: memoh-web
    restart: unless-stopped
    ports:
      - "${NAS_LAN_IP:-192.168.50.10}:8082:8082"
    depends_on:
      - server
    networks:
      - nas-platform
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8082/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local
  containerd_data:
    driver: local
  memoh_data:
    driver: local
  server_cni_state:
    driver: local

networks:
  nas-platform:
    external: true
