---
name: Deploy Test

on:
  push:
    branches: [main]
    paths:
      - "ansible/**"
      - "inventory/**"
      - ".github/workflows/deploy-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "ansible/**"
      - "inventory/**"
      - ".github/workflows/deploy-test.yml"

jobs:
  deploy-test:
    name: "Playbook Dry-Run (--check --diff)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Ansible
        run: |
          pip install ansible-core
          ansible-galaxy collection install -r requirements.yml

      - name: Create test inventory
        run: |
          mkdir -p /tmp/test-inventory/group_vars
          cat > /tmp/test-inventory/hosts.yml << 'EOF'
          ---
          all:
            children:
              nas:
                hosts:
                  localhost:
                    ansible_connection: local
          EOF

          cat > /tmp/test-inventory/group_vars/all.yml << 'EOF'
          ---
          nas_lan_ip: "127.0.0.1"
          nas_lan_subnet: "127.0.0.0/8"
          nas_lan_interface: "lo"
          nas_timezone: "UTC"
          nas_ntp_servers:
            - "0.debian.pool.ntp.org"
          nas_hostname: "nas-ci-test"
          nas_ssh_port: 22
          nas_ssh_allow_users: "root"
          nas_disk_space_threshold: 85
          nas_smart_short_schedule: "weekly"
          nas_smart_long_schedule: "monthly"
          baseline_packages:
            - curl
            - git
            - htop
            - jq
            - tree
          monitoring_smart_devices: []
          nftables_extra_tcp_ports: []
          docker_users: []
          EOF

      - name: "Dry-run: baseline.yml (--check --diff)"
        run: |
          ansible-playbook \
            -i /tmp/test-inventory \
            ansible/playbooks/baseline.yml \
            --check --diff \
            -e "ansible_roles_path=ansible/roles" \
            -v
        env:
          ANSIBLE_FORCE_COLOR: "1"

      - name: "Dry-run: docker.yml (--check --diff)"
        run: |
          ansible-playbook \
            -i /tmp/test-inventory \
            ansible/playbooks/docker.yml \
            --check --diff \
            -e "ansible_roles_path=ansible/roles" \
            -v
        env:
          ANSIBLE_FORCE_COLOR: "1"

      - name: "Syntax check: verify.yml"
        run: |
          ansible-playbook \
            -i /tmp/test-inventory \
            ansible/playbooks/verify.yml \
            --syntax-check \
            -e "ansible_roles_path=ansible/roles"
