---
name: Deploy Test

on:
  push:
    branches: [main]
    paths:
      - "ansible/**"
      - "inventory/**"
      - ".github/workflows/deploy-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "ansible/**"
      - "inventory/**"
      - ".github/workflows/deploy-test.yml"

jobs:
  deploy-test:
    name: "Deploy Test (Debian 13)"
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --privileged
      volumes:
        - /sys/fs/cgroup:/sys/fs/cgroup:rw

    steps:
      - name: Install prerequisites
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            python3 python3-pip python3-venv \
            git sudo systemd openssh-server \
            ca-certificates curl gnupg nftables

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python venv and install Ansible
        run: |
          python3 -m venv /opt/venv
          /opt/venv/bin/pip install ansible-core
          /opt/venv/bin/ansible-galaxy collection install -r requirements.yml

      - name: Create test inventory
        run: |
          mkdir -p /tmp/test-inventory/group_vars
          cat > /tmp/test-inventory/hosts.yml << 'EOF'
          ---
          all:
            children:
              nas:
                hosts:
                  localhost:
                    ansible_connection: local
                    ansible_python_interpreter: /opt/venv/bin/python3
          EOF

          cat > /tmp/test-inventory/group_vars/all.yml << 'EOF'
          ---
          nas_lan_ip: "127.0.0.1"
          nas_lan_subnet: "127.0.0.0/8"
          nas_lan_interface: "lo"
          nas_timezone: "UTC"
          nas_ntp_servers:
            - "0.debian.pool.ntp.org"
          nas_hostname: "nas-ci-test"
          nas_ssh_port: 22
          nas_ssh_allow_users: "root"
          nas_disk_space_threshold: 85
          nas_smart_short_schedule: "weekly"
          nas_smart_long_schedule: "monthly"
          baseline_packages:
            - curl
            - git
            - htop
            - jq
            - tree
          monitoring_smart_devices: []
          nftables_extra_tcp_ports: []
          EOF

      - name: Run baseline playbook (real deploy)
        run: |
          /opt/venv/bin/ansible-playbook \
            -i /tmp/test-inventory \
            ansible/playbooks/baseline.yml \
            -e "ansible_roles_path=ansible/roles" \
            --skip-tags "reboot" \
            -v
        env:
          ANSIBLE_FORCE_COLOR: "1"

      - name: Run Docker playbook (real deploy)
        run: |
          /opt/venv/bin/ansible-playbook \
            -i /tmp/test-inventory \
            ansible/playbooks/docker.yml \
            -e "ansible_roles_path=ansible/roles" \
            -e '{"docker_users": []}' \
            -v
        env:
          ANSIBLE_FORCE_COLOR: "1"

      - name: Verify baseline state
        run: |
          set +e
          echo "=== Hostname ==="
          hostname

          echo "=== SSH Config ==="
          grep -E "^(PasswordAuthentication|PermitRootLogin|AllowUsers)" /etc/ssh/sshd_config

          echo "=== NTP Config ==="
          cat /etc/systemd/timesyncd.conf

          echo "=== nftables Config ==="
          cat /etc/nftables.conf || echo "nftables.conf not found (may be expected in container)"

          echo "=== Sysctl ==="
          sysctl vm.swappiness

          echo "=== Docker ==="
          docker --version || echo "Docker not available (expected in container)"
          cat /etc/docker/daemon.json || echo "No daemon.json"

          echo "=== Unattended Upgrades ==="
          dpkg -l unattended-upgrades | tail -1

          echo "=== All verifications complete ==="

      - name: Test idempotency (run baseline again)
        run: |
          /opt/venv/bin/ansible-playbook \
            -i /tmp/test-inventory \
            ansible/playbooks/baseline.yml \
            -e "ansible_roles_path=ansible/roles" \
            --skip-tags "reboot" \
            -v 2>&1 | tee /tmp/idempotency.log

          echo "Re-run completed. Check output above for changed tasks."
        env:
          ANSIBLE_FORCE_COLOR: "1"
