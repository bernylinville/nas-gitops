---
# baseline/handlers/main.yml — Baseline role handlers
- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted
  listen: Restart sshd

- name: Restart systemd-timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: restarted
  listen: Restart systemd-timesyncd
