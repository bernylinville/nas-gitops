---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: "Pre | Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600

    - name: "Pre | Install systemd (required in container)"
      ansible.builtin.apt:
        name:
          - systemd
          - openssh-server
          - python3
        state: present

    - name: "Pre | Wait for systemd initialization"
      ansible.builtin.command:
        cmd: systemctl is-system-running
      register: __baseline_systemctl_status
      until: >
        'running' in __baseline_systemctl_status.stdout or
        'degraded' in __baseline_systemctl_status.stdout
      retries: 30
      delay: 5
      changed_when: false
      failed_when: __baseline_systemctl_status.rc > 1

  roles:
    - role: baseline
