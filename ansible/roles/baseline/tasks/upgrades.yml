---
# baseline/tasks/upgrades.yml — Unattended security upgrades
- name: "Upgrades | Install unattended-upgrades"
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present

- name: "Upgrades | Enable unattended-upgrades (security only)"
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: "0644"
    backup: true

- name: "Upgrades | Enable auto-upgrade timer"
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
