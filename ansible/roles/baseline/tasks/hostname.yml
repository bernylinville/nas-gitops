---
# baseline/tasks/hostname.yml — Set hostname
- name: "Hostname | Set system hostname"
  ansible.builtin.hostname:
    name: "{{ baseline_hostname }}"
  when: ansible_virtualization_type | default('') != 'docker'

- name: "Hostname | Set hostname in container (fallback)"
  ansible.builtin.copy:
    content: "{{ baseline_hostname }}"
    dest: /etc/hostname
    mode: "0644"
  when: ansible_virtualization_type | default('') == 'docker'
