---
# baseline/tasks/time.yml — Timezone and NTP configuration
- name: "Time | Set timezone"
  community.general.timezone:
    name: "{{ baseline_timezone }}"
    hwclock: UTC
  when: ansible_virtualization_type | default('') != 'docker'

- name: "Time | Set timezone symlink in container (fallback)"
  ansible.builtin.file:
    src: "/usr/share/zoneinfo/{{ baseline_timezone }}"
    dest: /etc/localtime
    state: link
    force: true
  when: ansible_virtualization_type | default('') == 'docker'

- name: "Time | Configure systemd-timesyncd"
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf
    mode: "0644"
    backup: true
  notify: Restart systemd-timesyncd

- name: "Time | Enable and start systemd-timesyncd"
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started
  when: ansible_virtualization_type | default('') != 'docker'
