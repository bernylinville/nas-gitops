---
# baseline/tasks/sysctl.yml — Kernel parameter tuning
- name: "Sysctl | Apply sysctl settings"
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
  loop: "{{ baseline_sysctl_settings | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
