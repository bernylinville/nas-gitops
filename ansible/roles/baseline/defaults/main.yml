---
# baseline/defaults/main.yml — Default variables for baseline role
baseline_timezone: "{{ nas_timezone | default('Asia/Shanghai') }}"

baseline_ntp_servers: "{{ nas_ntp_servers | default(['ntp.aliyun.com', 'time.apple.com']) }}"

baseline_hostname: "{{ nas_hostname | default('nas') }}"

baseline_packages: "{{ baseline_packages | default([]) }}"

# SSH hardening
baseline_ssh_port: "{{ nas_ssh_port | default(22) }}"
baseline_ssh_allow_users: "{{ nas_ssh_allow_users | default('kchou') }}"
baseline_ssh_permit_root_login: "no"
baseline_ssh_password_authentication: "no"
baseline_ssh_pubkey_authentication: "yes"
baseline_ssh_max_auth_tries: 3
baseline_ssh_client_alive_interval: 300
baseline_ssh_client_alive_count_max: 2

# Sysctl tuning
baseline_sysctl_settings:
  net.ipv4.ip_forward: "0"
  net.ipv4.conf.all.rp_filter: "1"
  net.ipv4.conf.default.rp_filter: "1"
  net.ipv4.icmp_echo_ignore_broadcasts: "1"
  net.ipv4.conf.all.accept_redirects: "0"
  net.ipv4.conf.default.accept_redirects: "0"
  net.ipv4.conf.all.send_redirects: "0"
  net.ipv4.conf.default.send_redirects: "0"
  net.ipv4.conf.all.accept_source_route: "0"
  net.ipv4.conf.default.accept_source_route: "0"
  fs.file-max: "262144"
  vm.swappiness: "10"
