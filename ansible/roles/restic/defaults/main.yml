---
# restic/defaults/main.yml — Default variables for restic backup role

# Repository
restic_repo_path: "/data/backups/restic"
restic_repo_password: "{{ restic_repo_password_secret }}"

# Environment file
restic_env_file: "/etc/restic/env"
restic_config_dir: "/etc/restic"

# Paths to backup
restic_backup_paths:
  - /data
  - /opt/compose
  - /etc

# Exclude patterns
restic_exclude_patterns:
  - "*.tmp"
  - "*.log"
  - "*.cache"
  - "lost+found"
  - "/data/backups/restic"

# Retention policy
restic_keep_daily: 7
restic_keep_weekly: 4
restic_keep_monthly: 6

# Schedule (systemd OnCalendar)
restic_timer_oncalendar: "*-*-* 02:00:00"

# Service tuning
restic_nice: 19
restic_ionice_class: "idle"
