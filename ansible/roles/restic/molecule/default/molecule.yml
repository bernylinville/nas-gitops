---
dependency:
  name: galaxy
  options:
    requirements-file: ${MOLECULE_PROJECT_DIRECTORY}/../../../requirements.yml
    force: false
driver:
  name: docker
platforms:
  - name: nas-restic-test
    image: "geerlingguy/docker-debian13-ansible:latest"
    command: ""
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  playbooks:
    converge: converge.yml
    verify: verify.yml
  inventory:
    host_vars:
      nas-restic-test:
        restic_repo_password: "test-password-for-ci"
        restic_repo_path: "/tmp/restic-test-repo"
        restic_backup_paths:
          - /etc
        restic_timer_oncalendar: "*-*-* 03:00:00"
verifier:
  name: ansible
