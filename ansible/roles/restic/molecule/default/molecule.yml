---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: nas-restic-test
    image: "geerlingguy/docker-debian13-ansible:latest"
    command: ""
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../../ansible/roles"
verifier:
  name: ansible
