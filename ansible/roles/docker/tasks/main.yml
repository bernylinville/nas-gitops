---
# docker/tasks/main.yml — Docker role entry point
- name: "Docker | Include install tasks"
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/tasks/install.yml"

- name: "Docker | Include configure tasks"
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/tasks/configure.yml"

- name: "Docker | Ensure Docker is started and enabled"
  ansible.builtin.systemd:
    name: docker
    state: "{{ docker_service_state }}"
    enabled: "{{ docker_service_enabled }}"
  when: docker_service_manage | bool

- name: "Docker | Flush handlers to avoid firewall conflicts"
  ansible.builtin.meta: flush_handlers

- name: "Docker | Include user tasks"
  ansible.builtin.include_tasks:
    file: "{{ role_path }}/tasks/users.yml"
  when: docker_users | length > 0
