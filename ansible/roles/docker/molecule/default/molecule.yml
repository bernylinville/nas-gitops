---
dependency:
  name: galaxy
  options:
    requirements-file: ${MOLECULE_PROJECT_DIRECTORY}/../../../requirements.yml
    force: false
driver:
  name: docker
platforms:
  - name: "nas-docker-test"
    image: "debian:trixie"
    command: "/sbin/init"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    tmpfs:
      - /run
      - /tmp
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    verify: verify.yml
  inventory:
    host_vars:
      nas-docker-test:
        docker_daemon_options:
          log-driver: "local"
          log-opts:
            max-size: "50m"
            max-file: "3"
          storage-driver: "overlay2"
        docker_users: []
verifier:
  name: ansible
