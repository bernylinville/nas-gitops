---
# docker/defaults/main.yml — Docker role variables
# Reference: geerlingguy.docker 8.0.0 defaults

# Edition: ce (Community Edition)
docker_edition: "ce"

# Packages to install
docker_packages:
  - "docker-{{ docker_edition }}"
  - "docker-{{ docker_edition }}-cli"
  - "containerd.io"
  - docker-buildx-plugin

docker_packages_state: present

# Old packages to remove before install
docker_obsolete_packages:
  - docker
  - docker.io
  - docker-engine
  - docker-doc
  - docker-compose
  - docker-compose-v2
  - podman-docker
  - containerd
  - runc

# Service management
docker_service_manage: true
docker_service_state: started
docker_service_enabled: true

# Compose plugin
docker_install_compose_plugin: true
docker_compose_package: docker-compose-plugin
docker_compose_package_state: present

# Repository
docker_add_repo: true
docker_repo_url: "https://download.docker.com/linux"
docker_apt_release_channel: stable
docker_apt_gpg_key: "{{ docker_repo_url }}/debian/gpg"
docker_apt_filename: "docker"

# Daemon configuration
docker_daemon_options:
  log-driver: "local"
  log-opts:
    max-size: "50m"
    max-file: "3"
  storage-driver: "overlay2"

# Users to add to docker group
docker_users: []
