---
dependency:
  name: galaxy
  options:
    requirements-file: ${MOLECULE_PROJECT_DIRECTORY}/../../../requirements.yml
    force: false
driver:
  name: docker
platforms:
  - name: "nas-nftables-test"
    image: "geerlingguy/docker-debian13-ansible:latest"
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    tmpfs:
      - /run
      - /tmp
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
  playbooks:
    converge: converge.yml
    verify: verify.yml
  inventory:
    host_vars:
      nas-nftables-test:
        nas_lan_subnet: "127.0.0.0/8"
        nas_lan_ip: "127.0.0.1"
        nas_ssh_port: 22
        nftables_extra_tcp_ports:
          - 3001
verifier:
  name: ansible
