---
# nftables/tasks/main.yml — Configure nftables firewall
- name: "Nftables | Install nftables"
  ansible.builtin.apt:
    name: nftables
    state: present

- name: "Nftables | Deploy nftables configuration"
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.conf
    mode: "0644"
    backup: true
    validate: "nft -c -f %s"
  notify: Reload nftables

- name: "Nftables | Enable and start nftables"
  ansible.builtin.systemd:
    name: nftables
    enabled: true
    state: started

- name: "Nftables | Disable ufw if present"
  ansible.builtin.systemd:
    name: ufw
    enabled: false
    state: stopped
  failed_when: false
  changed_when: false
