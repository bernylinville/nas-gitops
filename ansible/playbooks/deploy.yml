---
# deploy.yml — Deploy Docker Compose services to NAS
# Usage: ansible-playbook -i inventory/prod ansible/playbooks/deploy.yml
#
# Tags:
#   - network: Create shared Docker network only
#   - platform: Deploy platform services (caddy, uptime-kuma)
#   - apps: Deploy app services (memoh)
- name: Deploy compose services
  hosts: nas
  become: true
  gather_facts: true

  vars:
    compose_base_dir: /opt/compose
    compose_services:
      - name: caddy
        type: platform
        path: "{{ playbook_dir }}/../../compose/platform/caddy"
      - name: uptime-kuma
        type: platform
        path: "{{ playbook_dir }}/../../compose/platform/uptime-kuma"
      - name: monitoring
        type: platform
        path: "{{ playbook_dir }}/../../compose/platform/monitoring"
      - name: memoh
        type: apps
        path: "{{ playbook_dir }}/../../compose/apps/memoh"

  tasks:
    # --- Docker network ---
    - name: "Network | Create shared nas-platform network"
      community.docker.docker_network:
        name: nas-platform
        state: present
      tags: [network, platform, apps]

    # --- Directory structure ---
    - name: "Deploy | Create compose base directory"
      ansible.builtin.file:
        path: "{{ compose_base_dir }}/{{ item.type }}/{{ item.name }}"
        state: directory
        mode: "0755"
        owner: root
        group: root
      loop: "{{ compose_services }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [platform, apps]

    # --- Sync compose files ---
    - name: "Deploy | Sync compose files"
      ansible.builtin.copy:
        src: "{{ item.path }}/"
        dest: "{{ compose_base_dir }}/{{ item.type }}/{{ item.name }}/"
        mode: "0644"
        owner: root
        group: root
        directory_mode: "0755"
      loop: "{{ compose_services }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [platform, apps]

    - name: "Deploy | Template monitoring .env with secrets"
      ansible.builtin.copy:
        dest: "{{ compose_base_dir }}/platform/monitoring/.env"
        content: |
          NAS_LAN_IP={{ nas_lan_ip | default('192.168.50.10') }}
          GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
          TELEGRAM_BOT_TOKEN={{ notify_telegram_bot_token }}
          TELEGRAM_CHAT_ID={{ notify_telegram_chat_id }}
        mode: "0600"
        owner: root
        group: root
      tags: [platform]

    - name: "Deploy | Template Grafana alerting contactpoints"
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../compose/platform/monitoring/provisioning/alerting/contactpoints.yml.j2"
        dest: "{{ compose_base_dir }}/platform/monitoring/provisioning/alerting/contactpoints.yml"
        mode: "0644"
        owner: root
        group: root
      vars:
        chatid: "{{ notify_telegram_chat_id }}"
      tags: [platform]

    - name: "Deploy | Template Memoh config.toml with secrets"
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../compose/apps/memoh/config.toml.j2"
        dest: "{{ compose_base_dir }}/apps/memoh/config.toml"
        mode: "0600"
        owner: root
        group: root
      tags: [apps]

    - name: "Deploy | Template Memoh .env with secrets"
      ansible.builtin.copy:
        dest: "{{ compose_base_dir }}/apps/memoh/.env"
        content: |
          NAS_LAN_IP={{ nas_lan_ip | default('192.168.50.10') }}
          POSTGRES_PASSWORD={{ memoh_postgres_password }}
          MEMOH_SERVER_PORT={{ memoh_server_port | default('18080') }}
          MEMOH_WEB_PORT={{ memoh_web_port | default('18082') }}
        mode: "0600"
        owner: root
        group: root
      tags: [apps]

    - name: "Deploy | Set .env file permissions"
      ansible.builtin.file:
        path: "{{ compose_base_dir }}/{{ item.type }}/{{ item.name }}/.env"
        mode: "0600"
        owner: root
        group: root
      loop: "{{ compose_services }}"
      loop_control:
        label: "{{ item.name }}"
      failed_when: false
      tags: [platform, apps]

    # --- Platform services (Caddy first, then others) ---
    - name: "Deploy | Start platform services"
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base_dir }}/platform/{{ item }}"
        state: present
        pull: "missing"
      loop:
        - caddy
        - uptime-kuma
        - monitoring
      tags: [platform]

    # --- App services ---
    - name: "Deploy | Start app services"
      community.docker.docker_compose_v2:
        project_src: "{{ compose_base_dir }}/apps/{{ item }}"
        state: present
        pull: "missing"
      loop:
        - memoh
      tags: [apps]

    # --- Health check ---
    - name: "Deploy | Wait for Caddy health"
      ansible.builtin.uri:
        url: "http://{{ nas_lan_ip | default('192.168.50.10') }}:80/healthz"
        status_code: 200
      register: __deploy_caddy_health
      retries: 10
      delay: 5
      until: __deploy_caddy_health.status == 200
      tags: [platform, apps]

    - name: "Deploy | Print deployment summary"
      ansible.builtin.debug:
        msg: |
          === Deployment Complete ===
          Platform: caddy (2.11.2), uptime-kuma (2.2.1), grafana (12.4.1)
          Monitoring: prometheus (3.10.0), node-exporter (1.10.2), cadvisor (0.56.2)
          Apps: memoh (0.6.1)
          Access: http://{{ nas_lan_ip | default('192.168.50.10') }}
          Grafana: http://{{ nas_lan_ip | default('192.168.50.10') }}/grafana/
          Memoh: http://{{ nas_lan_ip | default('192.168.50.10') }}:{{ memoh_web_port | default('18082') }}

          Next: Run 'scripts/tag-deploy.sh --push' to tag this deployment
      tags: [platform]
