---
# verify.yml — Verify NAS baseline state
# Usage: ansible-playbook -i inventory/prod ansible/playbooks/verify.yml
- name: Verify NAS baseline
  hosts: nas
  become: true
  gather_facts: true

  tasks:
    # === System ===
    - name: "Verify | Check hostname"
      ansible.builtin.command:
        cmd: hostname
      register: __verify_hostname
      changed_when: false

    - name: "Verify | Assert hostname"
      ansible.builtin.assert:
        that:
          - __verify_hostname.stdout == nas_hostname
        fail_msg: "Hostname mismatch: {{ __verify_hostname.stdout }}"

    # === SSH ===
    - name: "Verify | Check sshd is running"
      ansible.builtin.systemd:
        name: sshd
      register: __verify_sshd
      changed_when: false

    - name: "Verify | Assert sshd is active"
      ansible.builtin.assert:
        that:
          - __verify_sshd.status.ActiveState == "active"

    - name: "Verify | Check SSH password auth is disabled"
      ansible.builtin.command:
        cmd: sshd -T
      register: __verify_sshd_config
      changed_when: false

    - name: "Verify | Assert password auth disabled"
      ansible.builtin.assert:
        that:
          - "'passwordauthentication no' in __verify_sshd_config.stdout"
        fail_msg: "SSH password authentication is still enabled!"

    # === Firewall ===
    - name: "Verify | Check nftables is active"
      ansible.builtin.systemd:
        name: nftables
      register: __verify_nftables
      changed_when: false

    - name: "Verify | Assert nftables is active"
      ansible.builtin.assert:
        that:
          - __verify_nftables.status.ActiveState == "active"

    - name: "Verify | Check nftables rules loaded"
      ansible.builtin.command:
        cmd: nft list ruleset
      register: __verify_nft_rules
      changed_when: false

    - name: "Verify | Assert INPUT policy is drop"
      ansible.builtin.assert:
        that:
          - "'policy drop' in __verify_nft_rules.stdout"
        fail_msg: "nftables INPUT policy is not drop!"

    # === Docker ===
    - name: "Verify | Check Docker is installed"
      ansible.builtin.command:
        cmd: docker --version
      register: __verify_docker
      changed_when: false
      failed_when: false

    - name: "Verify | Check Docker daemon is running"
      ansible.builtin.systemd:
        name: docker
      register: __verify_docker_svc
      changed_when: false
      when: __verify_docker.rc == 0

    - name: "Verify | Assert Docker is active"
      ansible.builtin.assert:
        that:
          - __verify_docker_svc.status.ActiveState == "active"
      when: __verify_docker.rc == 0

    - name: "Verify | Check Docker log driver"
      ansible.builtin.command:
        cmd: docker info --format '{% raw %}{{ .LoggingDriver }}{% endraw %}'
      register: __verify_docker_log
      changed_when: false
      when: __verify_docker.rc == 0

    - name: "Verify | Assert Docker log driver is local"
      ansible.builtin.assert:
        that:
          - __verify_docker_log.stdout == "local"
        fail_msg: "Docker log driver is {{ __verify_docker_log.stdout }}, expected 'local'"
      when: __verify_docker.rc == 0

    # === RAID ===
    - name: "Verify | Check RAID status"
      ansible.builtin.command:
        cmd: cat /proc/mdstat
      register: __verify_raid
      changed_when: false

    - name: "Verify | Assert RAID is healthy (UU)"
      ansible.builtin.assert:
        that:
          - "'[UU]' in __verify_raid.stdout"
        fail_msg: "RAID is degraded! {{ __verify_raid.stdout }}"

    # === SMART ===
    - name: "Verify | Check smartd is running"
      ansible.builtin.systemd:
        name: smartd
      register: __verify_smartd
      changed_when: false

    - name: "Verify | Assert smartd is active"
      ansible.builtin.assert:
        that:
          - __verify_smartd.status.ActiveState == "active"

    # === NTP ===
    - name: "Verify | Check time sync status"
      ansible.builtin.command:
        cmd: timedatectl show --property=NTPSynchronized --value
      register: __verify_ntp
      changed_when: false

    - name: "Verify | Assert NTP is synchronized"
      ansible.builtin.assert:
        that:
          - __verify_ntp.stdout == "yes"
        fail_msg: "NTP is not synchronized"
      failed_when: false

    # === Summary ===
    - name: "Verify | Print verification summary"
      ansible.builtin.debug:
        msg: |
          === NAS Baseline Verification Summary ===
          Hostname:  {{ __verify_hostname.stdout }}
          SSH:       {{ __verify_sshd.status.ActiveState }}
          Firewall:  {{ __verify_nftables.status.ActiveState }}
          Docker:    {{ __verify_docker_svc.status.ActiveState | default('not installed') }}
          RAID:      {{ 'healthy' if '[UU]' in __verify_raid.stdout else 'DEGRADED' }}
          SMART:     {{ __verify_smartd.status.ActiveState }}
          NTP:       {{ __verify_ntp.stdout | default('unknown') }}
